<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgb(220, 230, 230), lightblue);
        background-size: cover;
    //  background-position: center;
    //  background-attachment: fixed;
      color: green;
      min-height: 100vh;
      
    }

    .container{
      max-width: 1400px;
      margin: auto;
      padding: 30px 20px 60px;
    }

    .top-bar,
   .bottom-bar{
     position: relative;
      //margin-bottom:200px;
      
  
 
    }
  .top-bar img{
     display: block;
    text-align: center;
    top: 0;
    left: 0;
    //min-height: 200px;
    width: 100vw;
    }
  .bottom-bar img{
     display: block;
    text-align: center;
    top: 0;
    left: 0;
    
    width: 100vw;
    
    bottom: 0;
    
    }

    .logo-box{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .logo-box img{
      width:80px;
      height:80px;
      object-fit:contain;
      background:white;
      border-radius:50%;
      padding:8px;
      box-shadow:0 6px 18px rgba(0,0,0,0.4);
    }

    .title-area{
      text-align:center;
      flex:1;
    }

    .title-area h1{
      font-size:3rem;
      margin-bottom:10px;
      font-weight:800;
      letter-spacing:1px;
    }

    .title-area p{
      font-size:1.1rem;
      color:#d9e6ff;
    }

    .highlight{
      color:#2dd4bf;
    }

  

  
    .students-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));
      gap:28px;
      margin-top:20px;
    }

    .student-card{
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:25px;
      padding:25px 18px;
      text-align:center;
      backdrop-filter: blur(12px);
      transition:0.35s ease;
      position:relative;
      overflow:hidden;
      text-transform: uppercase;
    }

    .student-card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:6px;
      background:linear-gradient(to right, #2dd4bf, #16a34a);
    }

    .student-card{
      transform:translateY(-8px) scale(1.02);
      box-shadow:0 15px 30px rgba(0,0,0,0.35);
    }

    .rank{
      position:absolute;
      top:15px;
      right:15px;
      width:38px;
      height:38px;
      border-radius:50%;
      background:#0d9488;
      color:#fff;
      font-weight:bold;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.5rem;
      box-shadow:0 4px 10px rgba(0,0,0,0.25);
    }

    .student-image{
      width:140px;
      height:140px;
      margin:10px auto 20px;
      border-radius:50%;
      overflow:hidden;
      border:5px solid #0d9488;
      box-shadow:0 8px 20px rgba(0,0,0,0.35);
      background:white;
    }

    .student-image img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .student-name{
      font-size:1.15rem;
      font-weight:700;
      line-height:1.5;
      margin-bottom:18px;
      min-height:60px;
    }

    .score{
      display:inline-block;
      background:linear-gradient(135deg, #0d9488, #16a34a);
      color:#fff;
      padding:12px 22px;
      border-radius:40px;
      font-size:1.4rem;
      font-weight:800;
      box-shadow:0 6px 16px rgba(0,0,0,0.3);
    }

    .footer{
      margin-top:60px;
      text-align:center;
      color:#c8d6f2;
      font-size:0.95rem;
    }

    @media (max-width:768px){

      .title-area h1{
        font-size:2rem;
      }

      .logo-box img{
        width:65px;
        height:65px;
      }

      .students-grid{
        grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      }

      .student-image{
        width:120px;
        height:120px;
      }
    }
  </style>
</head>
